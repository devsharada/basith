<div class="mt-6">
  <!-- breadcrumb -->
  <app-breadcrumb [items]="[
    { label: 'Home', link: '/home' },
    { label: 'All Jewellery' }
  ]"></app-breadcrumb>

  <!-- filter & sort div -->
  <div class="sm:flex items-start justify-between gap-3 mt-4">
    <!-- Filter Button -->
      <button (click)="showFilters = !showFilters"
        class="cursor-pointer flex items-center justify-center gap-2 border border-b37800 px-2 sm:px-4 py-1.5 rounded-md text-1c1c1c text-sm/tight sm:text-[15px]/tight md:text-[17px]/tight font-semibold bg-white hover:shadow-md">
        Filters<svg class="size-3.5 md:size-4 lg:size-5" viewBox="0 0 26 25" fill="none"
          xmlns="http://www.w3.org/2000/svg">
          <path
            d="M25 12.3994H8.97189M3.31438 12.3994H1M3.31438 12.3994C3.31438 11.6493 3.61234 10.93 4.14271 10.3996C4.67309 9.8692 5.39243 9.57124 6.14249 9.57124C6.89255 9.57124 7.61189 9.8692 8.14226 10.3996C8.67263 10.93 8.97059 11.6493 8.97059 12.3994C8.97059 13.1494 8.67263 13.8688 8.14226 14.3991C7.61189 14.9295 6.89255 15.2275 6.14249 15.2275C5.39243 15.2275 4.67309 14.9295 4.14271 14.3991C3.61234 13.8688 3.31438 13.1494 3.31438 12.3994ZM25 20.9706H17.5431M17.5431 20.9706C17.5431 21.7208 17.2445 22.441 16.714 22.9715C16.1835 23.502 15.464 23.8 14.7137 23.8C13.9637 23.8 13.2443 23.5007 12.714 22.9704C12.1836 22.44 11.8856 21.7207 11.8856 20.9706M17.5431 20.9706C17.5431 20.2204 17.2445 19.5015 16.714 18.971C16.1835 18.4405 15.464 18.1425 14.7137 18.1425C13.9637 18.1425 13.2443 18.4404 12.714 18.9708C12.1836 19.5012 11.8856 20.2205 11.8856 20.9706M11.8856 20.9706H1M25 3.82811H20.9719M15.3144 3.82811H1M15.3144 3.82811C15.3144 3.07805 15.6123 2.35871 16.1427 1.82833C16.6731 1.29796 17.3924 1 18.1425 1C18.5139 1 18.8816 1.07315 19.2248 1.21528C19.5679 1.3574 19.8796 1.56572 20.1423 1.82833C20.4049 2.09095 20.6132 2.40272 20.7553 2.74584C20.8974 3.08896 20.9706 3.45672 20.9706 3.82811C20.9706 4.1995 20.8974 4.56726 20.7553 4.91038C20.6132 5.2535 20.4049 5.56527 20.1423 5.82788C19.8796 6.0905 19.5679 6.29881 19.2248 6.44094C18.8816 6.58307 18.5139 6.65622 18.1425 6.65622C17.3924 6.65622 16.6731 6.35826 16.1427 5.82788C15.6123 5.29751 15.3144 4.57817 15.3144 3.82811Z"
            stroke="#b37800" stroke-width="1.94595" stroke-miterlimit="10" stroke-linecap="round" />
        </svg>
      </button>
    <div class="flex items-center justify-end gap-2 mt-2 sm:mt-0">
      <p class="text-xs md:text-sm lg:text-[15px] font-medium text-b37800 capitalize">657 products</p>
      <span class="text-xs md:text-sm lg:text-[15px]">| Sort By :</span>
      <!-- sort div -->
      <div class="relative">
        <button (click)="open = !open" class="flex items-center justify-between border border-b37800 text-1c1c1c
           px-2 sm:px-4 py-2 rounded-md text-xs md:text-sm lg:text-[15px] w-28 sm:min-w-45">
          {{ selectedLabel }}
          <span><svg width="18" height="18" viewBox="0 0 118 118" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M34.4167 103.25V88.5" stroke="#B37800" stroke-width="8.5" stroke-linecap="round"
                stroke-linejoin="round" />
              <path d="M83.5833 103.25V73.75" stroke="#B37800" stroke-width="8.5" stroke-linecap="round"
                stroke-linejoin="round" />
              <path d="M83.5833 29.5V14.75" stroke="#B37800" stroke-width="8.5" stroke-linecap="round"
                stroke-linejoin="round" />
              <path d="M34.4167 44.25V14.75" stroke="#B37800" stroke-width="8.5" stroke-linecap="round"
                stroke-linejoin="round" />
              <path
                d="M34.4167 88.5C29.8349 88.5 27.5441 88.5 25.7369 87.7517C23.3275 86.7536 21.4132 84.839 20.4152 82.4299C19.6667 80.6225 19.6667 78.3318 19.6667 73.75C19.6667 69.1682 19.6667 66.8775 20.4152 65.0701C21.4132 62.661 23.3275 60.7464 25.7369 59.7483C27.5441 59 29.8349 59 34.4167 59C38.9984 59 41.2893 59 43.0964 59.7483C45.5058 60.7464 47.4201 62.661 48.4182 65.0701C49.1667 66.8775 49.1667 69.1682 49.1667 73.75C49.1667 78.3318 49.1667 80.6225 48.4182 82.4299C47.4201 84.839 45.5058 86.7536 43.0964 87.7517C41.2893 88.5 38.9984 88.5 34.4167 88.5Z"
                stroke="#B37800" stroke-width="8.5" />
              <path
                d="M83.5833 59C79.0015 59 76.7108 59 74.9035 58.2517C72.4943 57.2536 70.5797 55.339 69.5817 52.9299C68.8333 51.1225 68.8333 48.8317 68.8333 44.25C68.8333 39.6683 68.8333 37.3774 69.5817 35.5703C70.5797 33.1609 72.4943 31.2465 74.9035 30.2485C76.7108 29.5 79.0015 29.5 83.5833 29.5C88.1652 29.5 90.4559 29.5 92.2632 30.2485C94.6724 31.2465 96.5869 33.1609 97.585 35.5703C98.3333 37.3774 98.3333 39.6683 98.3333 44.25C98.3333 48.8317 98.3333 51.1225 97.585 52.9299C96.5869 55.339 94.6724 57.2536 92.2632 58.2517C90.4559 59 88.1652 59 83.5833 59Z"
                stroke="#B37800" stroke-width="8.5" />
            </svg>
          </span>
        </button>

        <div *ngIf="open" class="absolute right-0 mt-2 w-full bg-white shadow-lg rounded-md">
          <button *ngFor="let opt of sortOptions" (click)="selectSort(opt)" class="block w-full text-left px-4 py-2 text-xs md:text-sm lg:text-[15px]
             hover:bg-f9f9f9">
            {{ opt.label }}
          </button>
        </div>
      </div>

    </div>
  </div>
    <!-- selected filter chips will show here -->
      <div *ngIf="selectedChips.length" class="flex flex-wrap items-center gap-2 mt-3">
        <div *ngFor="let chip of selectedChips"
          class="flex items-center gap-1 bg-f9f9f9 text-1c1c1c text-xs md:text-sm lg:text-[15px] px-2 py-1 rounded-full">
          {{ chip.label }}
          <button class="ml-1 text-1c1c1c cursor-pointer" (click)="removeChip(chip)">✕</button>
        </div>
        <button class="text-b37800 text-xs md:text-sm lg:text-[15px] underline cursor-pointer"
          (click)="clearAllChips()">Clear All</button>
      </div>


  <!-- Products and Filters Layout -->
  <div class="mt-4 grid gap-x-2 sm:gap-x-2.5 md:gap-3 lg:gap-4 md:gap-x-3 transition-all duration-300"
    [ngClass]="{ 'lg:grid-cols-[250px_1fr]': showFilters, 'grid-cols-1': !showFilters }">

    <!-- Filter Panel -->
    <app-filter [showFilters]="showFilters" [filters]="filters" (applyFilters)="onFilterApply($event)"
      (closePanel)="showFilters=false" (filterChanged)="onFilterChanged($event)">
    </app-filter>

    <!-- Products Grid -->
    <div>
      <div
        class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-4 xl:grid-cols-4 gap-2 sm:gap-2.5 md:gap-3">
        <ng-container *ngFor="let item of filteredProducts; let i = index">
          <!-- After 12 products, show a full-width image -->
          <ng-container *ngIf="i === 10">
            <div class="col-span-2 ">
              <img src="/assets/images/product/jewelry-offer.png" alt="Banner" class="w-full h-auto rounded-lg" />
            </div>
          </ng-container>

          <!-- product card -->
          <a [routerLink]="item.link">
            <div class="bg-f8f8f8 rounded-lg">
              <div class="w-full">
                <img [src]="item.image" [alt]="item.alt" class="w-full aspect-square rounded-lg" />
              </div>
              <div class="p-2">
                <div class="flex items-center justify-between gap-2">
                  <!-- item price -->
                  <p
                    class="text-1c1c1c capitalize font-semibold text-xs sm:text-base lg:text-lg xl:text-xl text-center">
                    {{ item.price }}</p>
                  <!-- wishlist icon -->
                  <svg class="size-5 lg:size-7 cursor-pointer" viewBox="0 0 38 38" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <path
                      d="M25.9702 5.31152C30.4928 5.31152 34.0366 8.84204 34.0366 13.3789C34.0365 16.1516 32.7914 18.7212 30.481 21.5479C28.1639 24.3825 24.8374 27.4033 20.7729 31.0889V31.0898L18.8872 32.8057L17.0024 31.0898L17.0015 31.0889C12.937 27.4033 9.61045 24.3825 7.29346 21.5479C4.98307 18.7212 3.73792 16.1516 3.73779 13.3789C3.73779 8.84204 7.28264 5.31152 11.8052 5.31152C14.3653 5.31165 16.8324 6.50687 18.4399 8.37988L18.8872 8.90137L19.3354 8.37988C20.943 6.50683 23.41 5.31159 25.9702 5.31152Z"
                      stroke="#B37800" stroke-width="1.18047" />
                  </svg>
                </div>
                <!-- item name -->
                <p
                  class="text-1c1c1c capitalize font-normal text-[10px] sm:text-xs/tight md:text-sm/tight lg:text-base/tight truncate mt-0.5">
                  {{ item.name }}</p>
              </div>
            </div>
          </a>
        </ng-container>
      </div>

      <!-- Mobile Filter Offcanvas -->
      <div class="fixed inset-0 z-50 lg:hidden" *ngIf="showFilters">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-black/40 bg-opacity-40" (click)="closeFilters()"></div>

        <!-- Drawer Panel -->
        <div class="absolute left-0 top-0 h-full w-64 bg-white shadow-lg transform transition-transform duration-300"
          [ngClass]="{ '-translate-x-full': !showFilters, 'translate-x-0': showFilters }">

          <!-- Header -->
          <div class="flex items-center justify-between p-4 border-b border-b37800">
            <h3 class="text-lg font-semibold text-1c1c1c">Filters</h3>
            <button (click)="closeFilters()" class="text-b37800 text-xl">✖</button>
          </div>

          <!-- Filter Content -->
          <div class="p-4 space-y-3 overflow-y-auto h-[calc(100%-60px)]">
            <!-- Filter Panel -->
            <app-filter [showFilters]="showFilters" [filters]="filters" (applyFilters)="onFilterApply($event)"
              (closePanel)="showFilters=false" (filterChanged)="onFilterChanged($event)">
            </app-filter>
          </div>
        </div>
      </div>
    </div>
  </div>
