<section class="w-full bg-white py-6 md:py-8 px-4 sm:px-6 lg:px-20">

    <!-- Decorative Element -->
    <div class="flex items-center justify-center space-x-1 sm:space-x-1.5 mb-2">
      <!-- Left Line -->
      <div class="bg-b37800 h-0.5 w-15 lg:w-30 cursor-pointer"></div>
      <!-- center flower -->
      <img class="w-6.25 h-6.25 sm:w-7.5 sm:h-7.5" src="/assets/images/home/flower.png" alt="flower">
      <!-- Right Line -->
      <div class="bg-b37800 h-0.5 w-15 lg:w-30 cursor-pointer"></div>
    </div>

    <!-- Title and Subtitle -->
    <div class="text-center">
      <p class="text-1c1c1c capitalize text-sm md:text-base lg:text-xl xl:text-2xl font-medium mb-0.5">Shop By</p>
      <h1 class="text-xl/tight sm:text-2xl/tight md:text-3xl/tight lg:text-4xl/tight xl:text-5xl/tight font-medium capitalize text-b37800">Category</h1>
    </div>

    <!-- category slider -->
    <div class="relative mt-4 md:mt-6 lg:mt-8 xl:mt-10">
      <swiper-container #swiperRef init="false" class="w-full">
        <!-- category card -->
        <swiper-slide *ngFor="let category of categories" class="py-1">
          <a [routerLink]="category.link">
            <div>
              <img [src]="category.image" [alt]="category.alt" class="w-full aspect-square rounded-full" />
            </div>
            <p class="text-1c1c1c capitalize font-normal text-xs sm:text-base lg:text-lg xl:text-xl text-center mt-1.5 lg:mt-3">{{ category.name }}</p>
          </a>
        </swiper-slide>
      </swiper-container>
    </div>
</section>
