<div class="w-full xl:max-w-7xl mx-auto py-8 px-4 md:px-6 lg:px-8">

    <!-- Section Title -->
    <h2 class="text-xl sm:text-2xl md:text-3xl lg:text-4xl xl:text-5xl text-center text-b37800 mb-6">
        Related Articles
    </h2>

    <!-- Articles Grid Container: Updated for 1-2-3 column responsiveness -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8">

        <!-- Start of Dynamic Article Card using *ngFor -->
        <div
            *ngFor="let article of relatedArticles; trackBy: articleTrackBy"
            class="bg-white rounded-xl shadow-lg hover:shadow-xl transition-shadow duration-300 overflow-hidden border border-gray-100">

            <!-- Image Placeholder -->
            <div class="aspect-video overflow-hidden">
                <!-- Image with Angular bindings for src and alt -->
                <img [src]="article.imageSrc" [alt]="article.imageAlt" class="w-full h-full object-cover">
            </div>

            <div class="p-6">
                <!-- Title with Angular interpolation -->
                <h3 class="text-sm md:text-base lg:text-lg xl:text-xl text-[#000000] mb-3">
                    {{ article.title }}
                </h3>

                <!-- Description with Angular interpolation -->
                <p class="text-xs md:text-sm text-[#000000A6] mb-4 line-clamp-3">
                    {{ article.description }}
                </p>

                <!-- Meta Info with Angular interpolation -->
                <div class="flex justify-between items-center text-xs text-gray-500 mb-6 ">
                    <span class="flex items-center">
                        <!-- Person Icon Placeholder -->
                        <i class="mr-1 text-sm">👤</i> By {{ article.author }}
                    </span>
                    <span class="flex items-center">
                        <!-- Calendar Icon Placeholder -->
                        <i class="mr-1 text-sm">📅</i> {{ article.date }}
                    </span>
                </div>

                <!-- Read More Button (Changed to <a> for a link, using href binding) -->
                <div class="text-center">
                  <a
                    [routerLink]="article.link"
                    class="inline-block w-full max-w-xs px-6 py-3 text-sm font-medium text-gray-800 border border-gray-800 rounded-full
                         hover:bg-b37800 hover:border-b37800 hover:text-white transition-colors duration-200  text-center"
                  >
                    Read More
                  </a>
                </div>
            </div>
        </div>
        <!-- End of Dynamic Article Card -->

    </div>
</div>
