  <!-- Login Modal -->
      <div *ngIf="show" class="fixed inset-0 z-50 flex items-center justify-center bg-black/30"
        (click)="closeLogin()">
        <div class="relative  max-w-7xl bg-white rounded-2xl shadow-2xl overflow-hidden"
          (click)="$event.stopPropagation()">
          <button (click)="closeLogin()"
            class="absolute top-5 right-5 z-50 p-2 text-gray-700 bg-white rounded-full shadow-md hover:bg-gray-100 transition cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
              stroke="currentColor" class="h-6 w-6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
          <app-login></app-login>
        </div>
      </div>
