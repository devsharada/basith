<div class="w-full bg-white py-6 md:py-8 px-4 sm:px-6 lg:px-20">
  <!-- breadcrumb -->
  <app-breadcrumb [items]="[
    { label: 'Home', link: '/home' },
    { label: 'Contact Us' }
  ]"></app-breadcrumb>

  <!-- section title -->
  <h1
    class="mt-3 text-center capitalize text-b37800 font-normal text-lg/tight sm:text-2xl/tight lg:text-3xl/tight xl:text-4xl/tight">
    Contact Us</h1>
  <!-- contact div -->
  <div class="w-full px-4 lg:px-16 mt-6 lg:mt-12">

    <!-- Top section: Image + Form -->
    <div class="sm:flex items-center justify-between gap-8">
      <!-- Left: Image -->
      <div class="w-full sm:w-1/2 rounded-xl overflow-hidden mb-3 sm:mb-0">
        <img src="/assets/images/home/contact-us.png" alt="contact us" class="w-full h-full object-cover" />
      </div>

      <!-- Right: Form -->
      <div class="w-full sm:w-1/2 flex flex-col justify-center mt-8 sm:mt-0">
        <form class="space-y-4">
          <div class="relative">
            <input type="text" [(ngModel)]="name" name="name"
              class="block px-2.5 pb-2 pt-4 w-full text-sm md:text-[15px] text-1c1c1c bg-f8f8f8 rounded-md border border-d9d8d8 appearance-none focus:outline-none focus:ring-0 focus:border-b37800 peer"
              placeholder=" " />
            <label
              class="absolute text-base text-767676 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-left bg-f8f8f8 px-2 peer-focus:px-2  peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto start-1">Name</label>
          </div>

          <div class="relative">
            <input type="email" [(ngModel)]="email" name="email"
              class="block px-2.5 pb-2 pt-4 w-full text-sm md:text-[15px] text-1c1c1c bg-f8f8f8 rounded-md border border-d9d8d8 appearance-none focus:outline-none focus:ring-0 focus:border-b37800 peer"
              placeholder=" " />
            <label
              class="absolute text-base text-767676 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-left bg-f8f8f8  px-2 peer-focus:px-2  peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto start-1">Email
              ID</label>
          </div>

          <div class="relative">
            <input type="tel" [(ngModel)]="phone" name="phone"
              class="block px-2.5 pb-2 pt-4 w-full text-sm md:text-[15px] text-1c1c1c bg-f8f8f8 rounded-md border border-d9d8d8 appearance-none focus:outline-none focus:ring-0 focus:border-b37800 peer"
              placeholder=" " />
            <label
              class="absolute text-base text-767676 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-left bg-f8f8f8  px-2 peer-focus:px-2  peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto start-1">Phone
              No.</label>
          </div>

          <div class="relative">
            <textarea [(ngModel)]="message" name="message" rows="4" placeholder=""
              class="block px-2.5 pb-2 pt-4 w-full text-sm md:text-[15px] text-1c1c1c bg-f8f8f8 rounded-md border border-d9d8d8 appearance-none focus:outline-none focus:ring-0 focus:border-b37800 peer"></textarea>
            <label
              class="absolute text-base text-767676 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-left bg-f8f8f8  px-2 peer-focus:px-2  peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/4 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto start-1">Message</label>
          </div>

          <button type="submit" (click)="submitForm()"
            class="mt-6 cursor-pointer w-32 mx-auto block border border-b37800 bg-b37800 text-white text-lg md:text-xl py-2 px-5  hover:bg-white hover:text-1c1c1c transition rounded-lg">
            Submit
          </button>
        </form>
      </div>
    </div>

    <!-- Contact Info Section -->
    <div class="text-center mt-12">
      <h2 class="text-xl md:text-2xl xl:text-3xl font-medium text-b37800 mb-1">Stay Connected With Us</h2>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 mt-8">
      <!-- Email -->
      <div class="col-span-1 border border-f8f8f8 rounded-lg p-6 text-center shadow-sm space-y-2">
        <div class="text-3xl mb-4 size-16 xl:size-20 flex items-center justify-center bg-f8f8f8 rounded-full mx-auto">
          <svg class="size-8 xl:size-11" viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M45 9H9C6.525 9 4.5225 11.025 4.5225 13.5L4.5 40.5C4.5 42.975 6.525 45 9 45H45C47.475 45 49.5 42.975 49.5 40.5V13.5C49.5 11.025 47.475 9 45 9ZM45 18L27 29.25L9 18V13.5L27 24.75L45 13.5V18Z"
              fill="#B37800" />
          </svg>
        </div>
        <p class="font-normal font-marcellus text-b37800 text-xl xl:text-2xl">Email Us</p>
        <p class="font-normal text-1c1c1c text-base xl:text-lg">info[at]sparkals[dot]com</p>
        <p class="font-normal text-1c1c1c text-base xl:text-lg">We typically respond within 24 hours</p>
      </div>

      <!-- Call -->
      <div class="col-span-1 border border-f8f8f8 rounded-lg p-6 text-center shadow-sm space-y-2">
        <div class="text-3xl mb-4 size-16 xl:size-20 flex items-center justify-center bg-f8f8f8 rounded-full mx-auto">
          <svg class="size-8 xl:size-11" viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M45.0225 34.605C42.255 34.605 39.5775 34.155 37.08 33.345C36.6886 33.2132 36.2681 33.1939 35.8664 33.2894C35.4646 33.3848 35.0977 33.5912 34.8075 33.885L31.275 38.3175C24.9075 35.28 18.945 29.5425 15.7725 22.95L20.16 19.215C20.7675 18.585 20.9475 17.7075 20.7 16.92C19.8675 14.4225 19.44 11.745 19.44 8.9775C19.44 7.7625 18.4275 6.75 17.2125 6.75H9.4275C8.2125 6.75 6.75 7.29 6.75 8.9775C6.75 29.88 24.1425 47.25 45.0225 47.25C46.62 47.25 47.25 45.8325 47.25 44.595V36.8325C47.25 35.6175 46.2375 34.605 45.0225 34.605Z"

          </svg>
        </div>
        <p class="font-normal font-marcellus text-b37800 text-xl xl:text-2xl">Call Us</p>
        <p class="font-normal text-1c1c1c text-base xl:text-lg">91+ 85235655670</p>
        <p class="font-normal text-1c1c1c text-base xl:text-lg">Mon–Fri, 9AM–6PM EST</p>
      </div>

      <!-- Visit -->
      <div
        class="col-span-1 sm:col-span-2 md:col-span-1 border border-f8f8f8 rounded-lg p-6 text-center shadow-sm space-y-2">
        <div class="text-3xl mb-4 size-16 xl:size-20 flex items-center justify-center bg-f8f8f8 rounded-full mx-auto">

              fill="#B37800" />
          </svg>
        </div>
        <p class="font-normal font-marcellus text-b37800 text-xl xl:text-2xl">Visit Us</p>
        <p class="font-normal text-1c1c1c text-base xl:text-lg">Marvel Feugo, opp. to season mall, Hadapsar, Pune,
          Maharashtra 411036</p>
      </div>
    </div>

    <!-- Social Icons -->
    <div class="text-center mt-10">
      <p class="font-normal font-marcellus text-1c1c1c text-xl xl:text-2xl">Follow For More</p>
